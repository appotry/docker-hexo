name: Greetings

on: [issues, pull_request_target]

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            感谢您提交 Issue！请确保提供以下信息以便我们更高效地处理：
            - Hexo / Node.js 版本
            - Docker 镜像版本
            - 容器启动日志
          pr-message: |
            感谢您的贡献！我们会尽快审查您的 PR。

            请确保：
            - Dockerfile 构建通过 (`docker build .`)
            - 测试通过 (`bash tests/docker_test.sh`)
            - README 如有更新，同步修改多语言版本
