name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
  watch:
    types: [started]
  release:
    types: [published]
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  buildx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get hexo version
        id: hexo-version
        run: |
          HEXO_VER=$(npm view hexo version 2>/dev/null)
          echo "version=$HEXO_VER" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            bloodstar/hexo:latest
            bloodstar/hexo:node20
            bloodstar/hexo:${{ steps.hexo-version.outputs.version }}-node20
